databases:
  - name: workload-db
    databaseName: workload_db
    plan: free       
    region: singapore 

services:
  - type: web
    name: workload-backend
    env: docker
    plan: free
    region: singapore
    rootDir: backend  
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workload-db
          property: connectionString
          
      - key: SECRET_KEY
        sync: false